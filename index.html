<!DOCTYPE html>
<html lang="pt-BR" class="bg-blue-600">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clima | Previsão do Tempo</title>
  <meta name="description" content="App de previsão do tempo com clima atual, previsão por hora e para 7 dias. Busque qualquer cidade do mundo." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Google Sans"', 'Roboto', 'system-ui', 'sans-serif'],
          },
          colors: {
            sky1: '#4a9fff',
            sky2: '#1e6fe0',
          },
          keyframes: {
            'fade-up': {
              '0%': { opacity: '0', transform: 'translateY(12px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'spin-slow': {
              '0%': { transform: 'rotate(0deg)' },
              '100%': { transform: 'rotate(360deg)' },
            },
            'float': {
              '0%,100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-6px)' },
            },
          },
          animation: {
            'fade-up': 'fade-up 0.5s ease-out forwards',
            'spin-slow': 'spin-slow 1s linear infinite',
            'float': 'float 3.5s ease-in-out infinite',
          },
        },
      },
    };
  </script>
  <style>
    body { -webkit-font-smoothing: antialiased; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-400 via-blue-500 to-blue-700 font-sans text-white">
  <main class="mx-auto flex min-h-screen w-full max-w-md flex-col px-5 pb-10 pt-6 sm:pt-10 lg:max-w-5xl">

    
    <header class="mb-6 flex items-center justify-between">
      <button id="locate-btn" type="button" aria-label="Usar minha localização"
        class="flex h-10 w-10 items-center justify-center rounded-full bg-white/15 backdrop-blur transition hover:bg-white/25 active:scale-95">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M22 12h-3M5 12H2"/>
        </svg>
      </button>
      <div class="flex flex-col items-center">
        <h1 id="city-name" class="max-w-[200px] truncate text-center text-lg font-semibold">—</h1>
        <p id="city-region" class="text-xs text-white/70"></p>
      </div>
      <button id="search-btn" type="button" aria-label="Buscar cidade"
        class="flex h-10 w-10 items-center justify-center rounded-full bg-white/15 backdrop-blur transition hover:bg-white/25 active:scale-95">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
      </button>
    </header>

    
    <form id="search-form" class="mb-6 hidden">
      <div class="relative">
        <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-white/60">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
        </span>
        <input id="search-input" type="text" autocomplete="off" placeholder="Buscar cidade..." aria-label="Buscar cidade"
          class="w-full rounded-2xl border border-white/20 bg-white/15 py-3 pl-11 pr-4 text-base text-white placeholder-white/60 outline-none backdrop-blur transition focus:border-white/40 focus:bg-white/20" />
      </div>
    </form>

   
    <div id="loading" class="hidden flex-1 flex-col items-center justify-center gap-3 py-24">
      <div class="h-10 w-10 animate-spin-slow rounded-full border-[3px] border-white/30 border-t-white"></div>
      <p class="text-sm text-white/70">Buscando previsão...</p>
    </div>

   
    <div id="error" class="hidden rounded-2xl border border-white/20 bg-white/15 p-4 text-center text-sm text-white backdrop-blur"></div>

    
    <section id="result" class="hidden flex-1 flex-col lg:grid lg:grid-cols-[1.05fr_minmax(0,1fr)] lg:items-start lg:gap-8">

      
      <div class="lg:rounded-[2rem] lg:bg-white/10 lg:p-8 lg:backdrop-blur">

        
        <div class="flex flex-col items-center lg:flex-row lg:items-center lg:gap-6">
          <div id="hero-icon" class="h-40 w-40 animate-float drop-shadow-2xl lg:h-44 lg:w-44 lg:shrink-0"></div>
          <div class="mt-2 text-center lg:mt-0 lg:text-left">
            <p id="hero-date" class="text-sm font-medium text-white/80"></p>
            <div class="mt-1 flex items-start justify-center lg:justify-start">
              <span id="hero-temp" class="text-7xl font-light leading-none tracking-tighter lg:text-8xl"></span>
              <span class="mt-2 text-3xl font-light lg:text-4xl">°</span>
            </div>
            <p id="hero-desc" class="mt-1 text-base font-medium text-white/90"></p>
            <p id="hero-feels" class="mt-0.5 text-sm text-white/70"></p>
          </div>
        </div>

      
      <div class="mt-6 grid grid-cols-2 gap-4 rounded-3xl bg-white/15 p-5 backdrop-blur lg:bg-white/10">
        <div class="flex items-center gap-3">
          <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-white/20">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/></svg>
          </span>
          <div class="leading-tight">
            <p id="detail-wind" class="text-sm font-semibold"></p>
            <p class="text-xs text-white/70">Vento</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-white/20">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M16 14v6M8 14v6M12 16v6"/></svg>
          </span>
          <div class="leading-tight">
            <p id="detail-rain" class="text-sm font-semibold"></p>
            <p class="text-xs text-white/70">Chance de chuva</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-white/20">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v8"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m8 6 4-4 4 4"/><path d="M16 18a4 4 0 0 0-8 0"/></svg>
          </span>
          <div class="leading-tight">
            <p id="detail-pressure" class="text-sm font-semibold"></p>
            <p class="text-xs text-white/70">Pressão</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-white/20">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>
          </span>
          <div class="leading-tight">
            <p id="detail-humidity" class="text-sm font-semibold"></p>
            <p class="text-xs text-white/70">Umidade</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-white/20">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
          </span>
          <div class="leading-tight">
            <p id="detail-uv" class="text-sm font-semibold"></p>
            <p class="text-xs text-white/70">Índice UV</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-white/20">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
          <div class="leading-tight">
            <p id="detail-cloud" class="text-sm font-semibold"></p>
            <p class="text-xs text-white/70">Nuvens</p>
          </div>
        </div>
      </div>

      
      <div class="mt-4 grid grid-cols-2 gap-4 rounded-3xl bg-white/15 p-5 backdrop-blur lg:bg-white/10">
        <div class="flex items-center gap-3">
          <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-white/20 text-amber-300">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M4.9 9.9l1.4 1.4M2 18h2M20 18h2M17.7 11.3l1.4-1.4M22 22H2"/><path d="m8 6 4-4 4 4"/><path d="M16 18a4 4 0 0 0-8 0"/></svg>
          </span>
          <div class="leading-tight">
            <p id="detail-sunrise" class="text-sm font-semibold"></p>
            <p class="text-xs text-white/70">Nascer do sol</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-white/20 text-orange-300">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10V2M4.9 9.9l1.4 1.4M2 18h2M20 18h2M17.7 11.3l1.4-1.4M22 22H2"/><path d="m16 6-4 4-4-4"/><path d="M16 18a4 4 0 0 0-8 0"/></svg>
          </span>
          <div class="leading-tight">
            <p id="detail-sunset" class="text-sm font-semibold"></p>
            <p class="text-xs text-white/70">Pôr do sol</p>
          </div>
        </div>
      </div>

     
      <div class="mt-4 hidden items-center justify-between rounded-3xl bg-white/15 p-5 backdrop-blur lg:flex">
        <div class="flex items-center gap-3">
          <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-white/20">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </span>
          <div class="leading-tight">
            <p id="clock-day" class="text-sm font-medium text-white/80"></p>
            <p id="clock-date" class="text-xs text-white/60"></p>
            <p id="clock-tz" class="text-[11px] text-white/50"></p>
          </div>
        </div>
        <p id="clock-time" class="font-light tabular-nums tracking-tight text-4xl"></p>
      </div>

      </div>
      

      
      <div class="lg:mt-0">

       
        <div class="mt-6 lg:mt-0">
          <div class="mb-3 flex items-center gap-2 px-1">
            <h2 id="hourly-title" class="text-sm font-semibold"></h2>
          </div>
          <div id="hourly" class="no-scrollbar flex gap-3 overflow-x-auto pb-1"></div>
        </div>

        
        <div class="mt-6">
          <h2 class="mb-3 px-1 text-sm font-semibold">Previsão para 7 dias</h2>
          <div id="daily" class="flex flex-col gap-2 rounded-3xl bg-white/15 p-2 backdrop-blur"></div>
        </div>

      </div>

    </section>
  </main>

  <script>
    
    const ICON = {
      sun: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-full w-full">
        <circle cx="32" cy="32" r="14" fill="#FFD15C"/>
        <g stroke="#FFD15C" stroke-width="4" stroke-linecap="round">
          <path d="M32 6v6M32 52v6M6 32h6M52 32h6M13 13l4 4M47 47l4 4M51 13l-4 4M17 47l-4 4"/>
        </g></svg>`,
      partly: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-full w-full">
        <circle cx="24" cy="22" r="10" fill="#FFD15C"/>
        <g stroke="#FFD15C" stroke-width="3" stroke-linecap="round"><path d="M24 4v5M24 35v5M6 22h5M37 22h5M11 9l3 3M37 35l-3-3"/></g>
        <path d="M44 50H22a11 11 0 1 1 2.5-21.7A13 13 0 0 1 49 33.5 9 9 0 0 1 44 50z" fill="#EAF2FB"/></svg>`,
      cloud: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-full w-full">
        <path d="M46 48H20a13 13 0 1 1 3-25.6A15 15 0 0 1 52 27.5 10.5 10.5 0 0 1 46 48z" fill="#EAF2FB"/>
        <path d="M40 24a15 15 0 0 0-17-1.6" stroke="#CFE0F2" stroke-width="2" stroke-linecap="round"/></svg>`,
      rain: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-full w-full">
        <circle cx="24" cy="18" r="8" fill="#FFD15C"/>
        <g stroke="#FFD15C" stroke-width="3" stroke-linecap="round"><path d="M24 3v4M8 18h4M11 7l3 3"/></g>
        <path d="M44 42H22a12 12 0 1 1 2.6-23.7A14 14 0 0 1 49 26 10 10 0 0 1 44 42z" fill="#EAF2FB"/>
        <g stroke="#5AA2F7" stroke-width="4" stroke-linecap="round"><path d="M24 48l-3 7M34 48l-3 7M44 48l-3 7"/></g></svg>`,
      drizzle: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-full w-full">
        <path d="M44 40H22a12 12 0 1 1 2.6-23.7A14 14 0 0 1 49 24 10 10 0 0 1 44 40z" fill="#EAF2FB"/>
        <g stroke="#5AA2F7" stroke-width="3.5" stroke-linecap="round"><path d="M25 46l-2 5M34 46l-2 5M43 46l-2 5"/></g></svg>`,
      storm: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-full w-full">
        <path d="M44 38H22a12 12 0 1 1 2.6-23.7A14 14 0 0 1 49 22 10 10 0 0 1 44 38z" fill="#D8E4F2"/>
        <path d="M34 38l-8 12h7l-3 9 11-15h-7l4-6z" fill="#FFD15C"/></svg>`,
      snow: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-full w-full">
        <path d="M44 40H22a12 12 0 1 1 2.6-23.7A14 14 0 0 1 49 24 10 10 0 0 1 44 40z" fill="#EAF2FB"/>
        <g fill="#9EC6F5"><circle cx="24" cy="50" r="2.5"/><circle cx="34" cy="54" r="2.5"/><circle cx="44" cy="50" r="2.5"/></g></svg>`,
      fog: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-full w-full">
        <path d="M44 36H22a12 12 0 1 1 2.6-23.7A14 14 0 0 1 49 20 10 10 0 0 1 44 36z" fill="#EAF2FB"/>
        <g stroke="#CFE0F2" stroke-width="3" stroke-linecap="round"><path d="M16 44h32M20 52h28"/></g></svg>`,
    };

   
    const WEATHER_CODES = {
      0:{cat:"sun",desc:"Céu limpo"},1:{cat:"partly",desc:"Predomínio de sol"},2:{cat:"partly",desc:"Parcialmente nublado"},3:{cat:"cloud",desc:"Nublado"},
      45:{cat:"fog",desc:"Névoa"},48:{cat:"fog",desc:"Névoa com geada"},
      51:{cat:"drizzle",desc:"Garoa fraca"},53:{cat:"drizzle",desc:"Garoa moderada"},55:{cat:"drizzle",desc:"Garoa intensa"},
      56:{cat:"drizzle",desc:"Garoa congelante"},57:{cat:"drizzle",desc:"Garoa congelante"},
      61:{cat:"rain",desc:"Chuva fraca"},63:{cat:"rain",desc:"Chuva moderada"},65:{cat:"rain",desc:"Chuva forte"},
      66:{cat:"rain",desc:"Chuva congelante"},67:{cat:"rain",desc:"Chuva congelante forte"},
      71:{cat:"snow",desc:"Neve fraca"},73:{cat:"snow",desc:"Neve moderada"},75:{cat:"snow",desc:"Neve forte"},77:{cat:"snow",desc:"Grãos de neve"},
      80:{cat:"rain",desc:"Pancadas fracas"},81:{cat:"rain",desc:"Pancadas moderadas"},82:{cat:"storm",desc:"Pancadas fortes"},
      85:{cat:"snow",desc:"Pancadas de neve"},86:{cat:"snow",desc:"Pancadas de neve fortes"},
      95:{cat:"storm",desc:"Tempestade"},96:{cat:"storm",desc:"Tempestade com granizo"},99:{cat:"storm",desc:"Tempestade forte"},
    };
    const describe = (code) => WEATHER_CODES[code] || { cat:"cloud", desc:"Indefinido" };
    const iconFor = (code) => ICON[describe(code).cat] || ICON.cloud;

    
    const form = document.getElementById("search-form");
    const input = document.getElementById("search-input");
    const searchBtn = document.getElementById("search-btn");
    const locateBtn = document.getElementById("locate-btn");
    const elLoading = document.getElementById("loading");
    const elError = document.getElementById("error");
    const elResult = document.getElementById("result");

    function show(state) {
      elLoading.classList.toggle("hidden", state !== "loading");
      elLoading.classList.toggle("flex", state === "loading");
      elError.classList.toggle("hidden", state !== "error");
      elResult.classList.toggle("hidden", state !== "result");
      elResult.classList.toggle("flex", state === "result");
    }

    async function getCoordinates(city) {
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=pt&format=json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("Falha ao buscar a cidade.");
      const data = await res.json();
      if (!data.results || data.results.length === 0) throw new Error("Cidade não encontrada. Tente outro nome.");
      return data.results[0];
    }

    async function getWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
        + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,precipitation,cloud_cover,is_day`
        + `&hourly=temperature_2m,weather_code,precipitation_probability`
        + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset,uv_index_max,wind_speed_10m_max`
        + `&timezone=auto&forecast_days=7`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("Falha ao buscar a previsão.");
      return res.json();
    }

    const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

    
    let currentTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;

   
    function nowInTZ(tz) {
      const s = new Date().toLocaleString("sv-SE", { timeZone: tz }); 
      return new Date(s.replace(" ", "T"));
    }

    
    const hhmm = (iso) => iso.slice(11, 16);

    function dayLabel(dateStr, index) {
      if (index === 0) return "Hoje";
      const date = new Date(dateStr + "T00:00:00");
      return cap(date.toLocaleDateString("pt-BR", { weekday: "short" }).replace(".", ""));
    }

    const WIND_DIRS = ["N","NE","L","SE","S","SO","O","NO"];
    const windDir = (deg) => WIND_DIRS[Math.round(deg / 45) % 8];
    const uvLabel = (uv) => uv == null ? "—" : uv < 3 ? "Baixo" : uv < 6 ? "Moderado" : uv < 8 ? "Alto" : uv < 11 ? "Muito alto" : "Extremo";

    function render(place, weather) {
      const cur = weather.current;
      const info = describe(cur.weather_code);

    
      currentTZ = weather.timezone || currentTZ;
      const now = nowInTZ(currentTZ);

      
      document.getElementById("city-name").textContent = place.name;
      const region = [place.admin1, place.country].filter(Boolean).join(", ");
      document.getElementById("city-region").textContent = region;

  
      document.getElementById("hero-icon").innerHTML = iconFor(cur.weather_code);
      document.getElementById("hero-date").textContent =
        cap(now.toLocaleDateString("pt-BR", { weekday: "long" })) + " · " +
        now.toLocaleDateString("pt-BR", { day: "2-digit", month: "short" });
      document.getElementById("hero-temp").textContent = Math.round(cur.temperature_2m);
      document.getElementById("hero-desc").textContent = info.desc;
      document.getElementById("hero-feels").textContent = "Sensação de " + Math.round(cur.apparent_temperature) + "°";

      
      document.getElementById("detail-wind").textContent = Math.round(cur.wind_speed_10m) + " km/h " + windDir(cur.wind_direction_10m);
      document.getElementById("detail-rain").textContent = (weather.daily.precipitation_probability_max[0] ?? 0) + "%";
      document.getElementById("detail-pressure").textContent = Math.round(cur.surface_pressure) + " mbar";
      document.getElementById("detail-humidity").textContent = cur.relative_humidity_2m + "%";
      const uv = weather.daily.uv_index_max[0];
      document.getElementById("detail-uv").textContent = (uv == null ? "—" : Math.round(uv)) + " · " + uvLabel(uv);
      document.getElementById("detail-cloud").textContent = cur.cloud_cover + "%";
      document.getElementById("detail-sunrise").textContent = hhmm(weather.daily.sunrise[0]);
      document.getElementById("detail-sunset").textContent = hhmm(weather.daily.sunset[0]);

      
      const hourlyTitle = document.getElementById("hourly-title");
      hourlyTitle.textContent = cap(now.toLocaleDateString("pt-BR", { weekday: "long" })) + " · " +
        now.toLocaleDateString("pt-BR", { day: "2-digit", month: "short" });

      const hourly = document.getElementById("hourly");
      hourly.innerHTML = "";
      const times = weather.hourly.time;
      let start = times.findIndex((t) => new Date(t) >= now);
      if (start < 0) start = 0;
      for (let i = start; i < Math.min(start + 24, times.length); i += 1) {
        const t = new Date(times[i]);
        const isNow = i === start;
        const label = isNow ? "Agora" : t.getHours().toString().padStart(2, "0") + "h";
        const temp = Math.round(weather.hourly.temperature_2m[i]);
        const rain = weather.hourly.precipitation_probability[i] ?? 0;
        const cell = document.createElement("div");
        cell.className = "flex w-16 shrink-0 flex-col items-center gap-1 rounded-2xl px-2 py-3 " +
          (isNow ? "bg-white/25" : "bg-white/10");
        cell.innerHTML = `
          <span class="text-xs font-medium text-white/80">${label}</span>
          <span class="h-8 w-8">${iconFor(weather.hourly.weather_code[i])}</span>
          <span class="text-sm font-semibold">${temp}°</span>
          <span class="flex items-center gap-0.5 text-[10px] text-white/70">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8 8 6 11 6 15a6 6 0 0 0 12 0c0-4-2-7-6-13z"/></svg>${rain}%
          </span>`;
        hourly.appendChild(cell);
      }

    
      const daily = document.getElementById("daily");
      daily.innerHTML = "";
      weather.daily.time.forEach((date, i) => {
        const d = describe(weather.daily.weather_code[i]);
        const max = Math.round(weather.daily.temperature_2m_max[i]);
        const min = Math.round(weather.daily.temperature_2m_min[i]);
        const rain = weather.daily.precipitation_probability_max[i] ?? 0;
        const row = document.createElement("div");
        row.className = "flex items-center gap-3 rounded-2xl px-3 py-2.5 transition hover:bg-white/10";
        row.innerHTML = `
          <span class="w-12 text-sm font-medium">${dayLabel(date, i)}</span>
          <span class="h-8 w-8 shrink-0">${ICON[d.cat] || ICON.cloud}</span>
          <span class="flex flex-1 items-center gap-1 text-xs text-white/70">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8 8 6 11 6 15a6 6 0 0 0 12 0c0-4-2-7-6-13z"/></svg>${rain}%
          </span>
          <span class="text-sm font-semibold">${max}° <span class="font-normal text-white/60">${min}°</span></span>`;
        daily.appendChild(row);
      });

      show("result");
    }

    async function searchCity(city) {
      if (!city.trim()) return;
      show("loading");
      try {
        const place = await getCoordinates(city);
        const weather = await getWeather(place.latitude, place.longitude);
        render(place, weather);
      } catch (err) {
        elError.textContent = err.message || "Algo deu errado. Tente novamente.";
        show("error");
      }
    }

    async function loadByCoords(lat, lon, label) {
      show("loading");
      try {
        const weather = await getWeather(lat, lon);
        render({ name: label || "Sua localização", admin1: "", country: "" }, weather);
      } catch (err) {
        elError.textContent = err.message || "Algo deu errado.";
        show("error");
      }
    }

    
    searchBtn.addEventListener("click", () => {
      form.classList.toggle("hidden");
      if (!form.classList.contains("hidden")) input.focus();
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      searchCity(input.value);
      form.classList.add("hidden");
      input.value = "";
    });

    
    locateBtn.addEventListener("click", () => {
      if (!navigator.geolocation) return searchCity("São Paulo");
      show("loading");
      navigator.geolocation.getCurrentPosition(
        (pos) => loadByCoords(pos.coords.latitude, pos.coords.longitude, "Localização atual"),
        () => searchCity("São Paulo"),
      );
    });

    
    function tickClock() {
      const tz = currentTZ;
      const now = new Date();
      const opts = { timeZone: tz };
      const day = document.getElementById("clock-day");
      const date = document.getElementById("clock-date");
      const time = document.getElementById("clock-time");
      const tzEl = document.getElementById("clock-tz");
      if (day) day.textContent = cap(now.toLocaleDateString("pt-BR", { ...opts, weekday: "long" }));
      if (date) date.textContent = now.toLocaleDateString("pt-BR", { ...opts, day: "2-digit", month: "long", year: "numeric" });
      if (time) time.textContent = now.toLocaleTimeString("pt-BR", { ...opts, hour: "2-digit", minute: "2-digit", second: "2-digit" });
      if (tzEl) tzEl.textContent = "Horário local · " + tz.replace(/_/g, " ");
    }
    tickClock();
    setInterval(tickClock, 1000);

    
    window.addEventListener("DOMContentLoaded", () => searchCity("São Paulo"));
  </script>
</body>
</html>
